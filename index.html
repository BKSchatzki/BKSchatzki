    <style>
      :root {
        color-scheme: light;
        --bg: #fbfaf7;
        --ink: #1f2528;
        --muted: #687176;
        --line: #ddd8cf;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--ink);
        font-family:
          ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        line-height: 1.5;
      }

      main {
        width: min(100% - 32px, 760px);
        padding: 56px 0;
        text-align: center;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.4rem, 9vw, 5.5rem);
        font-weight: 760;
        line-height: 0.95;
        letter-spacing: 0;
      }

      .title {
        margin: 18px 0 0;
        color: var(--muted);
        font-size: clamp(1rem, 3vw, 1.25rem);
      }

      .roles {
        margin: 28px auto 0;
        max-width: 590px;
        font-size: clamp(1rem, 2.8vw, 1.16rem);
      }

      .roles p {
        margin: 0;
      }

      .roles p + p {
        margin-top: 4px;
      }

      .stack {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 8px;
        margin: 44px auto 0;
        padding: 0;
        list-style: none;
      }

      .stack img {
        height: 32px;
        width: auto;
      }

      .links {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-top: 44px;
        font-size: 0.95rem;
      }

      a {
        color: inherit;
        text-underline-offset: 0.22em;
      }

      a:hover {
        color: var(--muted);
      }

      footer {
        margin-top: 56px;
        border-top: 1px solid var(--line);
        padding-top: 18px;
        color: var(--muted);
        font-size: 0.82rem;
      }
    </style>
