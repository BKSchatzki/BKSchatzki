      rel="stylesheet"

    <style>
      :root {
        color-scheme: light;
        --bg: #f3ebe0;
        --ink: #342a22;
        --muted: #74685b;
        --line: #d7c7b4;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background-color: var(--bg);
        background-image:
          linear-gradient(180deg, rgba(255, 253, 248, 0.45), rgba(123, 88, 58, 0.1)),
          repeating-linear-gradient(
            115deg,
            rgba(81, 55, 35, 0.035) 0,
            rgba(81, 55, 35, 0.035) 1px,
            transparent 1px,
            transparent 12px
          );
        color: var(--ink);
        font-family: "Source Serif 4", Georgia, serif;
        line-height: 1.5;
      }

      main {
        width: min(100% - 32px, 760px);
        padding: 56px 0;
        text-align: center;
      }

      h1 {
        margin: 0;
        color: #3a2d24;
        font-family: "Cormorant Garamond", Georgia, serif;
        font-size: clamp(3.1rem, 8.8vw, 5.35rem);
        font-style: normal;
        font-weight: 700;
        line-height: 0.88;
        letter-spacing: 0;
      }

      .title {
        margin: 24px 0 0;
        color: var(--muted);
        font-size: clamp(1rem, 2.2vw, 1.1rem);
        font-weight: 500;
      }

      .roles {
        margin: 28px auto 0;
        max-width: none;
        font-size: clamp(1rem, 2vw, 1.07rem);
      }

      .roles p {
        margin: 0;
      }

      .roles p + p {
        margin-top: 4px;
      }

      .stack {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 8px;
        margin: 44px auto 0;
        padding: 0;
        list-style: none;
      }

      .stack img {
        height: 32px;
        width: auto;
        filter: saturate(0.88) sepia(0.05);
      }

      .links {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-top: 44px;
        font-size: 0.95rem;
      }

      a {
        color: inherit;
        text-underline-offset: 0.22em;
      }

      a:hover {
        color: #6f745f;
      }

      footer {
        margin-top: 56px;
        border-top: 1px solid var(--line);
        padding-top: 18px;
        color: var(--muted);
        font-size: 0.82rem;
      }
    </style>
